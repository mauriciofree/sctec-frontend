<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição do curso</title>
</head>
<body>

    <header>
        <h1>Formulário de inscrição do curso</h1>
    </header>
    <section id="formulario">
        <h2>Preencha os dados abaixo e clique em salvar para se inscrever.</h2>


         <form action=""  id="formularioCurso" name="formularioCurso">
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" name="nome" required maxleng="200">
            <br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>
            <br>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" required maxleng="3" min="18" max="120"> <label>anos</label>
            <br>

            <label for="materia">Matéria:</label>
            <select id="materia" name="materia" required>
                <option value="" id="materia_vazio"></option>
                <option value="matematica" id="materia_matematica">Matemática</option>
                <option value="portugues" id="materia_portugues">Português</option>
                <option value="biologia" id="materia_biologia">Biologia</option>
                <option value="ciencias" id="materia_ciencias">Ciências</option>
                <option value="historia" id="materia_historia">História</option>
                <option value="geografia" id="materia_geografia">Geografia</option>
                <option value="artes" id="materia_artes">Artes</option>
            </select>
            <br>

            <labe>Turnos (pode ser selecionado mais de uma opção):</label><br>
            <select id="turnos" name="turnos" required multiple>
                <option value="matutino" id="turno_matutino">Matutino</option>
                <option value="vespertino" id="turno_vespertino">Vespertino</option>
                <option value="noturno" id="turno_noturno">Noturno</option>
            </select>
            <br>
           

            <label for="escolaridade">Nível der escolaridade:</label>
            <select id="escolaridade" name="escolaridade" required>
                <option value="" id="escolaridade_vazio"></option>
                <option value="superior_completo" id="escolaridade_superior_completo">Ensino Superior Completo</option>
                <option value="cursando_mestrado" id="escolaridade_cursando_mestrado">Cursando Mestrado</option>
                <option value="mestrado_completo" id="escolaridade_mestrado_completo">Mestrado Completo</option>
                <option value="cursando_doutrorado" id="escolaridade_cursando_doutrorado">Cursando Doutrorado</option>
                <option value="doutorado_completo" id="escolaridade_doutorado_completo">Doutorado Completo</option>
            </select>
            <br>

            <label for="descricao">Descrição sobre si mesmo:</label><br>
            <textarea name="descricao" id="descricao" cols="40" rows="10" required maxlength="200"></textarea>
            <br>

            <input type="submit" value="Canditar-se">
            

        </form>
            


    </section>
    <footer>
        <p>Direitos reservados a Maurício</p>
    </footer>
</body>
</html>
